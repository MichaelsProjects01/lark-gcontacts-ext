<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Connecting...</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        background: #f5f5f5;
        color: #333;
      }
      .msg { text-align: center; }
      .msg h2 { font-size: 18px; margin-bottom: 8px; }
      .msg p { font-size: 13px; color: #666; }
    </style>
  </head>
  <body>
    <div class="msg">
      <h2>Connecting Google Contacts...</h2>
      <p>This window will close automatically.</p>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const error = params.get('error');

      if (window.opener) {
        window.opener.postMessage(
          { type: 'GOOGLE_AUTH_CALLBACK', code, error },
          '*'
        );
        setTimeout(() => window.close(), 500);
      } else {
        document.querySelector('h2').textContent = 'Something went wrong';
        document.querySelector('p').textContent = 'Please close this window and try again.';
      }
    </script>
  </body>
</html>
